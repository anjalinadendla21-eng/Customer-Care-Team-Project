<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-primary mb-4">
Edit Customer Details
</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" class="form-control" name="name" value="{{customer.name}}" required>
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input
    type="tel"
    class="form-control"
    name="phone"
    value="{{customer.phone}}"
    pattern="[0-9]{10}"
    maxlength="10"
    placeholder="Enter 10-digit phone number"
    required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input
    type="email"
    class="form-control"
    name="email"
    value="{{customer.email}}"
    placeholder="example@gmail.com"
    required>
</div>

<div class="col-md-6 mb-3">
<label>Category</label>
<input type="text" class="form-control" name="category" value="{{customer.category}}" required>
</div>

<div class="col-12 mb-3">
<label>Description</label>
<textarea class="form-control" name="description" rows="4" required>{{customer.description}}</textarea>
</div>

<div class="col-md-6 mb-3">
<label>Priority</label>
<select class="form-select" name="priority">
    <option {% if customer.priority=="Low" %}selected{% endif %}>Low</option>
    <option {% if customer.priority=="Medium" %}selected{% endif %}>Medium</option>
    <option {% if customer.priority=="High" %}selected{% endif %}>High</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Status</label>
<select class="form-select" name="status">
    <option {% if customer.status=="Open" %}selected{% endif %}>Open</option>
    <option {% if customer.status=="In Progress" %}selected{% endif %}>In Progress</option>
    <option {% if customer.status=="Resolved" %}selected{% endif %}>Resolved</option>
</select>
</div>

</div>

<div class="text-center">
<button class="btn btn-primary">Update Customer</button>

<a href="/" class="btn btn-secondary">Back</a>
</div>

</form>

</div>

</div>

</body>
</html>
